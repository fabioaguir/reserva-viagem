<mat-nav-list>
    @for (link of links(); track link) {
    <a mat-list-item routerLink="{{ link.url }}" routerLinkActive="mat-list-item-active"
        [routerLinkActiveOptions]="{exact: true}" (cancel)="closeSidenav()">{{ link.label }}</a>
    }
</mat-nav-list>

<mat-action-list>
    <button mat-list-item>Sair</button>
</mat-action-list>
